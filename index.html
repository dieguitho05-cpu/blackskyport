<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BLACK SKYPORT</title>

<!-- Librerías -->
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

/* =======================
   ESTILOS (NO CAMBIADOS)
======================= */

body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #f4f4f4;
}

.menu {
  width: 220px;
  height: 100vh;
  background: #111;
  color: white;
  position: fixed;
}

.menu-title {
  padding: 20px;
  text-align: center;
  font-weight: bold;
}

.menu-item {
  padding: 15px;
  cursor: pointer;
}

.menu-item:hover {
  background: #333;
}

.container {
  margin-left: 220px;
  padding: 20px;
}

.vista {
  background: white;
  padding: 20px;
  border-radius: 10px;
}

</style>

</head>

<body>

<!-- MENU -->
<div class="menu">
  <div class="menu-title">✈ BLACK SKYPORT</div>

  <div class="menu-item" onclick="mostrar('home')">🏠 Inicio</div>
  <div class="menu-item" onclick="mostrar('nuevo')">➕ Nuevo</div>
  <div class="menu-item" onclick="mostrar('reportes')">📊 Reportes</div>
</div>

<!-- CONTENIDO -->
<div class="container">

<h2>✈ BLACK SKYPORT</h2>

<!-- HOME -->
<div id="home" class="vista">
  <h3>Panel Principal</h3>
  <div id="lista"></div>
</div>

<!-- NUEVO -->
<div id="nuevo" class="vista" style="display:none;">
  <h3>Nuevo Servicio</h3>

  <input id="cliente" placeholder="Cliente">
  <input id="origen" placeholder="Origen">
  <input id="destino" placeholder="Destino">
  <input id="precio" type="number" placeholder="Precio">

  <button onclick="guardar()">Guardar</button>
</div>

<!-- REPORTES -->
<div id="reportes" class="vista" style="display:none;">
  <h3>Reportes</h3>

  <input type="file" id="fileInput">
  <button onclick="exportarExcel()">Exportar Excel</button>

  <canvas id="grafico"></canvas>
</div>

</div>

<script>

/* =======================
   BASE DE DATOS LOCAL
======================= */

let datos = JSON.parse(localStorage.getItem("datos")) || [];

/* =======================
   NAVEGACIÓN
======================= */

function mostrar(vista) {
  document.querySelectorAll(".vista").forEach(v => v.style.display = "none");
  document.getElementById(vista).style.display = "block";
}

/* =======================
   GUARDAR DATOS
======================= */

function guardar() {

  const cliente = document.getElementById("cliente").value;
  const origen = document.getElementById("origen").value;
  const destino = document.getElementById("destino").value;
  const precio = document.getElementById("precio").value;

  if (!cliente || !origen || !destino || !precio) {
    alert("Completa todos los campos");
    return;
  }

  const servicio = { cliente, origen, destino, precio };

  datos.push(servicio);

  localStorage.setItem("datos", JSON.stringify(datos));

  mostrarLista();
}

/* =======================
   MOSTRAR LISTA
======================= */

function mostrarLista() {

  const contenedor = document.getElementById("lista");
  contenedor.innerHTML = "";

  datos.forEach(d => {
    contenedor.innerHTML += `
      <div>
        ${d.cliente} - ${d.origen} → ${d.destino} - S/ ${d.precio}
      </div>
    `;
  });
}

/* =======================
   EXPORTAR EXCEL
======================= */

function exportarExcel() {

  try {

    if (!datos.length) {
      alert("No hay datos para exportar");
      return;
    }

    const ws = XLSX.utils.json_to_sheet(datos);
    const wb = XLSX.utils.book_new();

    XLSX.utils.book_append_sheet(wb, ws, "Servicios");

    XLSX.writeFile(wb, "blackskyport.xlsx");

  } catch (error) {
    console.error(error);
    alert("Error al exportar Excel");
  }
}

/* =======================
   IMPORTAR EXCEL
======================= */

document.getElementById("fileInput").addEventListener("change", function(e) {

  const file = e.target.files[0];

  const reader = new FileReader();

  reader.onload = function(event) {

    try {

      const data = new Uint8Array(event.target.result);

      const workbook = XLSX.read(data, { type: "array" });

      const sheet = workbook.Sheets[workbook.SheetNames[0]];

      const json = XLSX.utils.sheet_to_json(sheet);

      datos = json;

      localStorage.setItem("datos", JSON.stringify(datos));

      mostrarLista();

      alert("Excel importado correctamente");

    } catch (error) {
      console.error(error);
      alert("Error al importar Excel");
    }

  };

  reader.readAsArrayBuffer(file);

});

/* =======================
   INICIO
======================= */

mostrarLista();

</script>

</body>
</html>
